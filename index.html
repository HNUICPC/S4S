<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student4Student — اتعلم من طالب زيك</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="nav-mount"></div>

<main>
  <section class="hero">
    <div class="hero-text fade-up">
      <h1>اتعلم من<br>طالب زيك</h1>
      <p>منصة تعليمية يقدم شروحات ومراجعات من طلاب متفوقين لمساعدتك في الدراسة.</p>
      <a href="departments.html" class="btn-primary">ابدأ دلوقتي</a>
    </div>
    <div class="hero-visual fade-up fade-up-delay-2">
      <div class="stat-card">
        <div class="num">+500</div>
        <div class="label">كورس متاح</div>
      </div>
      <div class="stat-card">
        <div class="num">+120</div>
        <div class="label">طالب مدرس</div>
      </div>
      <div class="stat-card">
        <div class="num">3</div>
        <div class="label">أقسام هندسية</div>
      </div>
      <div class="stat-card">
        <div class="num">4.9</div>
        <div class="label">متوسط التقييم</div>
      </div>
    </div>
  </section>

  <section>
    <div class="section-title">كليات الهندسة</div>
    <div class="cards-grid" id="depts-home"></div>
  </section>
</main>

<div id="footer-mount"></div>
<div id="modal-mount"></div>

<script src="data.js"></script>
<script>
document.getElementById('nav-mount').innerHTML = navHtml();
document.getElementById('footer-mount').innerHTML = footerHtml();
document.getElementById('modal-mount').innerHTML = modalHtml();
initModal();

const grid = document.getElementById('depts-home');
Object.entries(DEPTS).forEach(([key, d]) => {
  const totalCourses = Object.values(COURSES[key] || {}).reduce((sum, sems) =>
    sum + Object.values(sems).reduce((s2, arr) => s2 + arr.length, 0), 0);
  grid.innerHTML += `
    <a class="dept-card fade-up fade-up-delay-1" href="departments.html">
      <div class="dept-icon">${d.icon}</div>
      <h3>${d.name}</h3>
      <span class="count">${totalCourses} كورس</span>
    </a>`;
});
</script>
</body>
</html>
